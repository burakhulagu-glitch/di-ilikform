<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEA Model Tasarım Formu — Atatürk Üniversitesi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pu:#1C1464;--pu2:#4A35A8;--pu3:#8B75D0;--gold:#C8A028;--glt:#F0D060;
  --bg:#181450;--card:rgba(255,255,255,.07);--brd:rgba(255,255,255,.12);
  --tx:#F0ECFF;--tx2:#D4CCFF;--tx3:#B0A8E8;
  --gr:#1D9E75;--rd:#D85A30;--bl:#5BA3E8;
  --font:'Segoe UI',system-ui,sans-serif;
}
body{font-family:var(--font);background:linear-gradient(160deg,#181450 0%,#1E1860 60%,#141038 100%);background-attachment:fixed;color:var(--tx);min-height:100vh;font-size:17px}
.site-header{background:linear-gradient(135deg,#1C1464 0%,#3D2494 100%);
  padding:1.25rem 2rem;display:flex;align-items:center;gap:1rem;
  box-shadow:0 4px 20px rgba(28,20,100,.3)}
.hlogo{width:56px;height:56px;border-radius:50%;border:2px solid rgba(200,160,40,.5)}
.htxt .hu{font-size:12px;color:rgba(255,255,255,.65);letter-spacing:.05em;text-transform:uppercase}
.htxt .hd{font-size:17px;font-weight:700;color:#fff}
.htxt .hs{font-size:11px;color:var(--glt);margin-top:2px}
.prog-bar{background:rgba(20,16,60,.9);border-bottom:1px solid rgba(255,255,255,.1);padding:.75rem 1.5rem;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.3);backdrop-filter:blur(12px)}
.prog-inner{max-width:860px;margin:0 auto;display:flex;align-items:center;gap:4px;overflow-x:auto;padding-bottom:2px}
.sp{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);
  display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;
  color:rgba(255,255,255,.4);cursor:pointer;transition:all .25s;flex-shrink:0;position:relative}
.sp:hover .spt{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.spt{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(4px);
  background:var(--pu);color:#fff;font-size:11px;font-weight:500;white-space:nowrap;
  padding:4px 10px;border-radius:6px;opacity:0;transition:all .2s;pointer-events:none;z-index:200}
.sp.active{background:var(--pu2);border-color:var(--pu2);color:#fff}
.sp.done{background:var(--gr);border-color:var(--gr);color:#fff}
.sp-line{flex:1;height:2px;background:rgba(255,255,255,.12);min-width:8px;transition:background .3s}
.sp-line.done{background:var(--gr)}
.si{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0}
.sn{font-size:9px;color:rgba(255,255,255,.35);white-space:nowrap;text-align:center;max-width:56px;overflow:hidden;text-overflow:ellipsis}
.si:has(.sp.active) .sn{color:rgba(255,255,255,.9);font-weight:600}
.si:has(.sp.done) .sn{color:rgba(29,158,117,.8)}
.main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 6rem}
.card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:2.25rem;
  margin-bottom:1.25rem;box-shadow:0 4px 24px rgba(0,0,0,.3);backdrop-filter:blur(12px)}
.chdr{display:flex;align-items:flex-start;gap:14px;margin-bottom:1.75rem}
.cicon{width:54px;height:54px;border-radius:16px;display:flex;align-items:center;
  justify-content:center;font-size:24px;flex-shrink:0}
.ctitle{font-size:21px;font-weight:700;color:var(--pu)}
.csub{font-size:15px;color:#C4BCFF;margin-top:3px}
.ql{font-size:15px;color:#D4CCFF;margin:1.25rem 0 .75rem;font-weight:500}
.ql:first-child{margin-top:0}
.inp-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:560px){.inp-grid{grid-template-columns:1fr}}
.ig{display:flex;flex-direction:column;gap:.35rem}
.ig label{font-size:13px;color:#D4CCFF;font-weight:600}
.inp{padding:11px 15px;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;
  font-size:16px;font-family:var(--font);color:var(--tx);background:rgba(255,255,255,.08);
  width:100%;transition:border-color .2s}
.inp:focus{outline:none;border-color:rgba(139,117,208,.9);background:rgba(255,255,255,.12)}
.inp::placeholder{color:rgba(180,168,232,.45)}
.inp-mm{display:flex;align-items:center;gap:8px}
.inp-mm .inp{flex:1}
.inp-mm .unit{font-size:14px;color:var(--tx3);font-weight:600;white-space:nowrap}
textarea.inp{resize:vertical;min-height:90px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:.5rem}
.chip{padding:11px 20px;border-radius:10px;border:1.5px solid rgba(255,255,255,.15);
  font-size:15px;cursor:pointer;color:#D4CCFF;background:rgba(255,255,255,.06);
  transition:all .2s;user-select:none}
.chip:hover{border-color:var(--pu3);color:#EDE8FF;background:rgba(255,255,255,.12)}
.chip.sel{background:var(--pu2);border-color:var(--pu2);color:#fff}
.chip.sel-t{background:var(--gr);border-color:var(--gr);color:#fff}
.chip.sel-r{background:var(--rd);border-color:var(--rd);color:#fff}
.chip.sel-b{background:var(--bl);border-color:var(--bl);color:#fff}
.arch-wrap{width:100%;background:rgba(20,16,64,.6);border-radius:14px;
  border:1.5px solid rgba(255,255,255,.1);overflow:hidden;margin:1rem 0}
.arch-wrap svg{width:100%;height:auto;display:block}
.tg{cursor:pointer}
.tg .tb{transition:all .25s}
.tg:hover .tb{filter:drop-shadow(0 0 7px rgba(61,36,148,.65))}
.tg:hover .badge{fill:rgba(61,36,148,1)}
.tg.picked .tb{fill:#DDD5FF!important;stroke:rgba(61,36,148,.8)!important;stroke-width:1.5!important}
.tg.picked .badge{fill:rgba(61,36,148,1)!important}
.tg.impl .tb{fill:#BEE0FF!important;stroke:rgba(55,138,221,.8)!important}
.tg.impl .badge{fill:rgba(55,138,221,1)!important}
.tg.pont .tb{fill:#B8F0DC!important;stroke:rgba(29,158,117,.8)!important}
.tg.pont .badge{fill:rgba(29,158,117,1)!important}
.tg.kant .tb{fill:#FFD0C0!important;stroke:rgba(216,90,48,.8)!important}
.tg.kant .badge{fill:rgba(216,90,48,1)!important}
.tg.dim{cursor:default;pointer-events:none;opacity:.2}
@keyframes archGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(61,36,148,.3))}
  50%{filter:drop-shadow(0 0 14px rgba(61,36,148,.75))}}
.region-upper-active .tg[data-arch="upper"] .tb,
.region-lower-active .tg[data-arch="lower"] .tb{animation:archGlow 1.5s ease infinite}
.pb{border:1.5px solid rgba(255,255,255,.1);border-radius:14px;padding:1.5rem;margin-bottom:1rem;background:rgba(255,255,255,.04)}
.phdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.plbl{font-size:14px;font-weight:700;color:#C8BCFF;background:rgba(139,117,208,.15);
  padding:4px 14px;border-radius:20px;letter-spacing:.04em}
.brm{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(216,90,48,.3);
  background:transparent;color:var(--rd);cursor:pointer;font-size:16px;
  display:flex;align-items:center;justify-content:center;transition:all .2s}
.brm:hover{background:var(--rd);color:#fff;border-color:var(--rd)}
.badd{width:100%;padding:13px;border-radius:12px;
  border:2px dashed rgba(61,36,148,.22);background:transparent;
  color:var(--pu3);font-size:16px;font-weight:600;cursor:pointer;
  transition:all .2s;margin-top:.5rem;font-family:var(--font)}
.badd:hover{border-color:var(--pu2);color:var(--pu2);background:rgba(61,36,148,.03)}
.rr{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:10px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);margin-top:6px}
.rnum{width:32px;height:32px;border-radius:9px;background:#5A3FD8;color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.rchips{display:flex;gap:6px;flex-wrap:wrap}
.rc{padding:7px 13px;border-radius:8px;font-size:14px;cursor:pointer;
  border:1.5px solid rgba(255,255,255,.15);color:#B0A8E8;background:rgba(255,255,255,.05);transition:all .15s}
.rc:hover{border-color:var(--pu3);color:#EDE8FF}
.rc.ri{background:rgba(55,138,221,.12);border-color:var(--bl);color:var(--bl)}
.rc.rp{background:rgba(29,158,117,.12);border-color:var(--gr);color:var(--gr)}
.rc.rk{background:rgba(216,90,48,.12);border-color:var(--rd);color:var(--rd)}
.nav{display:flex;justify-content:space-between;align-items:center;
  margin-top:1.75rem;padding-top:1.75rem;border-top:1px solid var(--brd)}
.bback{padding:13px 26px;border-radius:10px;font-size:16px;font-weight:500;
  border:1.5px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:var(--tx2);
  cursor:pointer;transition:all .2s;font-family:var(--font)}
.bback:hover{border-color:rgba(139,117,208,.8);color:#EDE8FF;background:rgba(255,255,255,.1)}
.bnext{padding:13px 32px;border-radius:10px;font-size:16px;font-weight:700;
  border:none;background:linear-gradient(135deg,var(--pu2),var(--pu));
  color:#fff;cursor:pointer;transition:all .2s;font-family:var(--font);
  box-shadow:0 4px 14px rgba(61,36,148,.3)}
.bnext:hover{box-shadow:0 6px 20px rgba(61,36,148,.45);transform:translateY(-1px)}
.bfin{padding:13px 32px;border-radius:10px;font-size:16px;font-weight:700;
  border:none;background:linear-gradient(135deg,var(--gr),#0F6E56);
  color:#fff;cursor:pointer;transition:all .2s;font-family:var(--font)}
.sum-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.07)}
.sum-l{font-size:14px;color:#B0A8E8;min-width:180px;flex-shrink:0}
.sum-v{font-size:14px;color:var(--tx);font-weight:500}
.sum-ph{font-size:15px;font-weight:700;color:var(--pu3);margin:1.25rem 0 .5rem;
  padding:.5rem 1rem;background:rgba(139,117,208,.1);border-radius:8px;
  border-left:3px solid var(--pu3)}
.sum-acts{display:flex;gap:10px;flex-wrap:wrap;margin-top:1.75rem}
.bpdf{flex:1;min-width:180px;padding:13px;border-radius:10px;font-size:15px;font-weight:700;
  border:none;background:var(--pu);color:#fff;cursor:pointer;transition:all .2s;font-family:var(--font)}
.bpdf:hover{background:var(--pu2)}
.bmail{flex:1;min-width:180px;padding:13px;border-radius:10px;font-size:15px;font-weight:700;
  border:none;background:linear-gradient(135deg,var(--gold),#A07810);color:#fff;
  cursor:pointer;transition:all .2s;font-family:var(--font)}
.note{font-size:13px;color:var(--tx3);line-height:1.45;margin:.35rem 0 .75rem}
.badd.glow-add{margin-top:1.5rem;padding:16px 18px;border:1.5px solid rgba(240,208,96,.75);border-radius:16px;
  background:linear-gradient(135deg,rgba(200,160,40,.22),rgba(74,53,168,.35),rgba(29,158,117,.16));
  color:#fff;font-size:17px;font-weight:800;letter-spacing:.01em;
  box-shadow:0 0 0 1px rgba(240,208,96,.16),0 0 18px rgba(240,208,96,.38),0 0 34px rgba(139,117,208,.28);
  animation:modelAddGlow 1.8s ease-in-out infinite}
.badd.glow-add:hover{transform:translateY(-1px);box-shadow:0 0 0 1px rgba(240,208,96,.28),0 0 26px rgba(240,208,96,.62),0 0 46px rgba(139,117,208,.42)}
@keyframes modelAddGlow{0%,100%{filter:drop-shadow(0 0 4px rgba(240,208,96,.35))}50%{filter:drop-shadow(0 0 16px rgba(240,208,96,.85))}}
.sum-sec-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:1.25rem 0 .5rem;
  padding:.5rem 1rem;background:rgba(139,117,208,.1);border-radius:8px;border-left:3px solid var(--pu3)}
.sum-sec-head .sum-ph{margin:0;padding:0;background:transparent;border-left:0}
.sum-edit{border:1px solid rgba(240,208,96,.45);background:rgba(240,208,96,.12);color:var(--glt);
  border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.sum-edit:hover{background:rgba(240,208,96,.22)}

.clear-step{margin-left:auto;border:1px solid rgba(216,90,48,.48);background:rgba(216,90,48,.12);color:#FFD0C0;
  border-radius:10px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.clear-step:hover{background:rgba(216,90,48,.24);border-color:rgba(216,90,48,.78);color:#fff}
.param-clear{border:1px solid rgba(216,90,48,.42);background:rgba(216,90,48,.1);color:#FFD0C0;
  border-radius:9px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.param-clear:hover{background:rgba(216,90,48,.22);border-color:rgba(216,90,48,.75);color:#fff}
.tooth-remove{border:1px solid rgba(216,90,48,.38);background:rgba(216,90,48,.1);color:#FFD0C0;
  border-radius:8px;padding:7px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font);white-space:nowrap}
.tooth-remove:hover{background:rgba(216,90,48,.24);color:#fff}
@media(max-width:620px){.chdr{flex-wrap:wrap}.clear-step{width:100%;margin-left:0}.phdr{gap:8px;flex-wrap:wrap}.param-clear{width:100%}.rr{align-items:flex-start;flex-wrap:wrap}.tooth-remove{width:100%}}


.analysts{position:fixed;bottom:1.25rem;right:1.25rem;font-size:11px;color:var(--tx3);
  text-align:right;line-height:1.6;background:rgba(20,16,60,.85);
  border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:8px 14px;
  backdrop-filter:blur(12px);pointer-events:none}
.analysts strong{color:var(--glt);display:block}
@media print{
  .prog-bar,.site-header,.nav,.analysts,.sum-acts,.sum-edit,.clear-step,.param-clear,.tooth-remove{display:none!important}
  body{background:#fff!important;color:#111!important;font-size:12pt}
  .main{max-width:none;padding:0}
  .card{box-shadow:none!important;border:1px solid #ccc!important;background:#fff!important;color:#111!important;break-inside:auto;page-break-inside:auto;backdrop-filter:none!important}
  .ctitle,.csub,.ql,.sum-l,.sum-v,.sum-ph,.note,.ig label{color:#111!important}
  .sum-row{break-inside:avoid;page-break-inside:avoid;border-bottom:1px solid #ddd!important}
  .sum-sec-head{background:#f4f4f4!important;border-left:3px solid #666!important;break-inside:avoid;page-break-inside:avoid}
  .pb{background:#fff!important;border:1px solid #ddd!important;break-inside:avoid;page-break-inside:avoid}
}
</style>
</head>

const UPPER = [[18, 102, 164, 30], [17, 124, 146, 25], [16, 148, 122, 20], [15, 174, 98, 14], [14, 202, 78, 9], [13, 234, 62, 4], [12, 270, 50, 1], [11, 308, 42, 0], [21, 372, 42, 0], [22, 410, 50, -1], [23, 446, 62, -4], [24, 478, 78, -9], [25, 506, 98, -14], [26, 532, 122, -20], [27, 556, 146, -25], [28, 578, 164, -30]];
const LOWER = [[48, 102, 236, -30], [47, 124, 254, -25], [46, 148, 278, -20], [45, 174, 302, -14], [44, 202, 322, -9], [43, 234, 338, -4], [42, 270, 350, -1], [41, 308, 358, 0], [31, 372, 358, 0], [32, 410, 350, 1], [33, 446, 338, 4], [34, 478, 322, 9], [35, 506, 302, 14], [36, 532, 278, 20], [37, 556, 254, 25], [38, 578, 236, 30]];

const STEPS=[
  {id:'person',title:'Kişisel Bilgiler',icon:'👤',bg:'rgba(28,20,100,.08)'},
  {id:'region',title:'Çene Bölgesi',icon:'🦷',bg:'rgba(200,160,40,.1)'},
  {id:'count', title:'Diş Sayısı',icon:'🔢',bg:'rgba(55,138,221,.1)'},
  {id:'teeth', title:'Diş Seçimi & Roller',icon:'🏗',bg:'rgba(28,20,100,.08)'},
  {id:'kant',  title:'Kantilever Uzantı Uzunluğu',icon:'↔',bg:'rgba(216,90,48,.08)'},
  {id:'impl',  title:'İmplant Detayları',icon:'📏',bg:'rgba(55,138,221,.1)'},
  {id:'model', title:'İmplant & Kemik Modeli',icon:'🧬',bg:'rgba(29,158,117,.08)'},
  {id:'load',  title:'Yükleme Koşulları',icon:'⚡',bg:'rgba(216,90,48,.08)'},
  {id:'output',title:'Analiz Çıktıları',icon:'📊',bg:'rgba(55,138,221,.1)'},
  {id:'extra', title:'Ek Notlar',icon:'📝',bg:'rgba(28,20,100,.06)'},
  {id:'summ',  title:'Özet & Tamamla',icon:'✅',bg:'rgba(29,158,117,.08)'},
];

let cur=0;
const st={
  person:{name:'',surname:'',phone:'',email:'',dept:''},
  region:null, count:8,
  params:[{id:1,teeth:[],roles:{},kantLenMap:{},implants:{},loading:{},greft:null,greftNote:''}],
  implantModel:'',implant3d:null,implantModeling:null,boneModel:null,
  greft:null,greftNote:'',
  dynLoad:false,loadType:null,dynLoadNote:'',
  outputs:[],regions:[],extraRegion:'',
  extra:'',gaps:'',
};

function getExclude(){return st.count===7?[18,28,48,38]:[];}

function freshParam(id){return {id:id,teeth:[],roles:{},kantLenMap:{},implants:{},loading:{},greft:null,greftNote:''};}
function purgeExcludedTeeth(){
  const ex=getExclude();
  if(!ex.length)return;
  st.params.forEach(p=>{
    ex.forEach(n=>{
      p.teeth=p.teeth.filter(t=>t!==n);
      delete p.roles[n];
      delete p.kantLenMap[n];
      delete p.implants[n];
      delete p.loading[n];
    });
  });
}
function removeTooth(pid,n){
  const p=st.params.find(x=>x.id===pid);
  if(!p)return;
  p.teeth=p.teeth.filter(t=>t!==n);
  delete p.roles[n];
  delete p.kantLenMap[n];
  delete p.implants[n];
  delete p.loading[n];
  R();
}
function clearParamAll(pid){
  const idx=st.params.findIndex(x=>x.id===pid);
  if(idx<0)return;
  st.params[idx]=freshParam(pid);
  R();
}
function resetAll(){
  st.person={name:'',surname:'',phone:'',email:'',dept:''};
  st.region=null;st.count=8;
  st.params=[freshParam(1)];
  st.implantModel='';st.implant3d=null;st.implantModeling=null;st.boneModel=null;
  st.greft=null;st.greftNote='';
  st.dynLoad=false;st.loadType=null;st.dynLoadNote='';
  st.outputs=[];st.regions=[];st.extraRegion='';st.extra='';st.gaps='';
  cur=0;maxVisited=0;R();
}
function resetStep(){
  const id=STEPS[cur].id;
  if(id==='person')st.person={name:'',surname:'',phone:'',email:'',dept:''};
  else if(id==='region')st.region=null;
  else if(id==='count')st.count=8;
  else if(id==='teeth')st.params=[freshParam(1)];
  else if(id==='kant')st.params.forEach(p=>{p.kantLenMap={};});
  else if(id==='impl')st.params.forEach(p=>{p.implants={};});
  else if(id==='model'){st.implantModel='';st.implant3d=null;st.implantModeling=null;st.boneModel=null;}
  else if(id==='load'){st.loadType=null;st.dynLoadNote='';st.params.forEach(p=>{p.loading={};});}
  else if(id==='output'){st.outputs=[];st.regions=[];st.extraRegion='';}
  else if(id==='extra'){st.extra='';st.gaps='';}
  else if(id==='summ'){
    if(!confirm('Tüm form verileri silinsin mi?'))return;
    resetAll();return;
  }
  R();
}

function addParam(){
  const id=st.params.length+1;
  st.params.push(freshParam(id));
  R();
}
function rmParam(id){
  if(st.params.length<=1)return;
  st.params=st.params.filter(p=>p.id!==id);
  R();
}
function setRole(pid,t,r){
  const p=st.params.find(x=>x.id===pid);
  if(!p)return;
  if(p.roles[t]===r){delete p.roles[t];}else{p.roles[t]=r;}
  if(p.roles[t]!=='kant')delete p.kantLenMap[t];
  if(p.roles[t]!=='implant')delete p.implants[t];
  if(!(p.roles[t]==='implant'||p.roles[t]==='kant'))delete p.loading[t];
  R();
}
function toggleTooth(pid,n){
  const p=st.params.find(x=>x.id===pid);
  if(!p||getExclude().includes(n))return;
  const idx=p.teeth.indexOf(n);
  if(idx>=0){
    p.teeth.splice(idx,1);
    delete p.roles[n];
    delete p.kantLenMap[n];
    delete p.implants[n];
    delete p.loading[n];
  }else{
    p.teeth.push(n);
  }
  R();
}
function updateArchClasses(pid){
  const p=st.params.find(x=>x.id===pid);
  if(!p)return;
  [...UPPER,...LOWER].forEach(function(row){
    const n=row[0];
    const el=document.getElementById('tooth_'+pid+'_'+n);
    if(!el)return;
    el.className='tg';
    if(getExclude().includes(n)){el.className='tg dim';return;}
    if(p.roles[n]==='implant'){el.className='tg impl';}
    else if(p.roles[n]==='pontic'){el.className='tg pont';}
    else if(p.roles[n]==='kant'){el.className='tg kant';}
    else if(p.teeth.includes(n)){el.className='tg picked';}
  });
}

function toothSVG(showU,showL,pid,interactive){
  const ex=getExclude();
  const p=pid!=null?st.params.find(x=>x.id===pid):null;
  const h=(showU&&showL)?420:210;
  const uOff=0;
  const lOff=(showU&&showL)?0:-210;

  function tClass(n,arch){
    if(ex.includes(n))return 'tg dim';
    if(!interactive)return 'tg';
    if(!p)return 'tg';
    if(p.roles[n]==='implant')return 'tg impl';
    if(p.roles[n]==='pontic')return 'tg pont';
    if(p.roles[n]==='kant')return 'tg kant';
    if(p.teeth.includes(n))return 'tg picked';
    return 'tg';
  }

  function tooth(n,cx,cy,rot,arch){
    const isMolar=[16,17,18,26,27,28,46,47,48,36,37,38].includes(n);
    const isPre=[14,15,24,25,44,45,34,35].includes(n);
    const w=isMolar?26:isPre?21:17;
    const h2=isMolar?30:isPre?26:22;
    const cls=tClass(n,arch);
    const tid='tooth_'+(pid||0)+'_'+n;
    const clk=interactive?'onclick="toggleTooth('+(pid||0)+','+n+')"':'';
    return '<g class="'+cls+'" id="'+tid+'" data-arch="'+arch+'" '+clk+
      ' transform="rotate('+rot+','+cx+','+cy+')" style="'+(ex.includes(n)?'pointer-events:none':'')+'">'+

    '<p style="font-size:14px;font-weight:600;color:#D4CCFF;margin:1.25rem 0 .5rem">Protetik & implant bileşenler</p>'+
    '<div class="chips">'+
    (function(){var r=['Implant govdesi','Implant boynu','Abutment','Kron','Kron alti metal'];
      var lbl=['&#304;mplant g&#246;vdesi','&#304;mplant boynu','Abutment','Kron','Kron alt&#305; metal'];
      return r.map(function(v,i){return '<div class="chip '+(st.regions.includes(v)?'sel-b':'')+'" onclick="togArr(st.regions,\''+v+'\');R()">'+lbl[i]+'</div>';}).join('');
    })()+
    '</div>'+
    '<p class="ql">Ekstra incelenecek bölge (isteğe bağlı)</p>'+
    '<input class="inp" type="text" value="'+st.extraRegion+'" oninput="st.extraRegion=this.value" placeholder="Örn: Kas yapıları, sinüs mukozası, PDL...">'+
    '<button class="badd" style="margin-top:.75rem" onclick="addExtraRegion()">+ Ekle</button>'
  );

  if(s.id==='extra') return (
    '<p class="ql">Eklemek istediğiniz ek bilgi veya özel koşullar var mı?</p>'+
    '<textarea class="inp" rows="4" placeholder="Metodolojik notlar, özel gereksinimler, varsa ön bilgiler..." oninput="st.extra=this.value">'+st.extra+'</textarea>'+
    '<p class="ql">Formda eksik gördüğünüz ya da farklı işlenmesini istediğiniz bir konu var mı?</p>'+
    '<textarea class="inp" rows="3" placeholder="Form yapısına dair öneri ve görüşleriniz..." oninput="st.gaps=this.value">'+st.gaps+'</textarea>'
  );

  if(s.id==='summ'){
    var jm={upper:'Üst çene (Maksilla)',lower:'Alt çene (Mandibula)',both:'Her iki çene'};
    var bm={patient:'Hasta-özgü CT/CBCT',open:'Açık erişimli anatomik model',team:'Analiz ekibinin geometrik modeli'};
    var im3={yes:'Evet, 3D data mevcut',no:'Hayır, mevcut değil',partial:'Kısmen mevcut'};
    var imd={yes:'Analiz ekibi modelleyecek',provide:'Kullanıcı tarafından temin edilecek',other:'Diğer / belirlenecek'};
    var lm={static:'Statik yük',dynamic:'Dinamik / siklik yük',both:'Statik + dinamik / siklik yük'};
    var rl={implant:'İmplant',pontic:'Pontik',kant:'Kantilever'};
    function esc(v){return String(v==null?'':v).replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function EH(t,i){return '<div class="sum-sec-head"><div class="sum-ph">'+t+'</div><button class="sum-edit" onclick="goEdit('+i+')">Düzenle</button></div>';}
    function SR(l,v){return '<div class="sum-row"><span class="sum-l">'+l+'</span><span class="sum-v">'+(v&&String(v).trim()?v:'—')+'</span></div>';}
    function yn(v){return v==='yes'?'Evet':(v==='no'?'Hayır':'—');}

    var html=EH('Kişisel Bilgiler',0)+
      SR('Ad Soyad',esc(st.person.name+' '+st.person.surname))+
      SR('Telefon',esc(st.person.phone||'—'))+
      SR('E-posta',esc(st.person.email||'—'))+
      SR('Bölüm',esc(st.person.dept||'—'))+
      EH('Çene Bölgesi',1)+
      SR('Çene',(jm[st.region]||'—'))+
      EH('Diş Sayısı',2)+
      SR('Diş sayısı',st.count+' diş')+
      EH('İmplant & Kemik Modeli',6)+
      SR('3D implant datası',(im3[st.implant3d]||'—'))+
      SR('İmplant geometrisi',(imd[st.implantModeling]||'—'))+
      SR('Kemik / çene modeli',(bm[st.boneModel]||'—'))+
      SR('Model notu',esc(st.implantModel||'—'));

    html+=EH('Diş Seçimi, Roller ve Greft',3);
    st.params.forEach(function(p){
      html+='<div class="pb"><div class="phdr"><span class="plbl">Model Parametresi '+p.id+'</span><button class="sum-edit" onclick="goEdit(3)">Düzenle</button></div>';
      html+=SR('Seçili dişler',p.teeth.length?p.teeth.slice().sort(function(a,b){return a-b;}).join(', '):'—');
      var roleStr=Object.entries(p.roles).map(function(e){return e[0]+': '+(rl[e[1]]||e[1]);}).join(' | ');
      html+=SR('Diş rolleri',roleStr||'—');
      html+=SR('Greft',yn(p.greft));
      if(p.greft==='yes')html+=SR('Greft açıklaması',esc(p.greftNote||'—'));
      html+='</div>';
    });

    html+=EH('Kantilever Uzantı Uzunluğu',4);
    var anyK=false;
    st.params.forEach(function(p){
      var k=Object.entries(p.kantLenMap);
      if(k.length){anyK=true;html+='<div class="pb"><div class="phdr"><span class="plbl">Model Parametresi '+p.id+'</span><button class="sum-edit" onclick="goEdit(4)">Düzenle</button></div>';
        k.forEach(function(e){html+=SR('Diş '+e[0]+' kantilever uzantı uzunluğu',esc(e[1])+' mm');});
        html+='</div>';
      }
    });
    if(!anyK)html+=SR('Kantilever bilgisi','Kantilever rolünde diş seçilmemiş veya uzunluk girilmemiş');

    html+=EH('İmplant Detayları',5);
    var anyImp=false;
    st.params.forEach(function(p){
      var imps=Object.entries(p.implants);
      if(imps.length){anyImp=true;html+='<div class="pb"><div class="phdr"><span class="plbl">Model Parametresi '+p.id+'</span><button class="sum-edit" onclick="goEdit(5)">Düzenle</button></div>';
        imps.forEach(function(e){var imp=e[1];html+=SR('Diş '+e[0]+' implant',[(imp.diam?'Ø'+esc(imp.diam)+' mm':''),(imp.len?'Boy '+esc(imp.len)+' mm':'')].filter(Boolean).join(' / ')||'—');});
        html+='</div>';
      }
    });
    if(!anyImp)html+=SR('İmplant bilgisi','İmplant rolünde diş seçilmemiş veya ölçü girilmemiş');

    html+=EH('Yükleme Koşulları',7)+
      SR('Yükleme tipi',(lm[st.loadType]||'—'))+
      ((st.loadType==='dynamic'||st.loadType==='both')?SR('Dinamik yük parametreleri',esc(st.dynLoadNote||'—')):'');
    var anyLoad=false;
    st.params.forEach(function(p){
      var loads=Object.entries(p.loading);
      if(loads.length){anyLoad=true;html+='<div class="pb"><div class="phdr"><span class="plbl">Model Parametresi '+p.id+'</span><button class="sum-edit" onclick="goEdit(7)">Düzenle</button></div>';
        loads.forEach(function(e){var lo=e[1];html+=SR('Diş '+e[0]+' yükleme',[(lo.force?esc(lo.force)+' N':''),(esc(lo.dir)||''),(esc(lo.area)||'')].filter(Boolean).join(' | ')||'—');});
        html+='</div>';
      }
    });
    if(!anyLoad)html+=SR('Yükleme detayı','Yüklenecek implant/kantilever dişi seçilmemiş veya değer girilmemiş');

    html+=EH('Analiz Çıktıları',8)+
      SR('Analiz sonuçları',st.outputs.length?st.outputs.map(esc).join(', '):'—')+
      SR('İncelenecek bölgeler / bileşenler',st.regions.length?st.regions.map(esc).join(', '):'—');

    html+=EH('Ek Notlar',9)+
      SR('Ek notlar',esc(st.extra||'—'))+
      SR('Formda eksik / farklı işlenecek konu',esc(st.gaps||'—'));

    html+='<div style="margin-top:1.5rem;padding:1rem 1.25rem;border-radius:12px;'+
      'background:rgba(29,158,117,.06);border:1px solid rgba(29,158,117,.25)">'+
      '<p style="font-size:14px;font-weight:600;color:var(--gr);margin-bottom:4px">✓ Özet hazır</p>'+ 
      '<p style="font-size:13px;color:#2D8060">Düzeltmek istediğiniz bölümün yanındaki “Düzenle” butonuna basarak ilgili sayfaya dönebilirsiniz.</p></div>'+ 
      '<div class="sum-acts" style="flex-direction:column;gap:.75rem">'+
      '<button class="bpdf" onclick="window.print()" style="font-size:16px;padding:14px">📄 PDF Olarak Kaydet / Yazdır</button>'+ 
      '<div style="padding:1rem 1.25rem;border-radius:12px;background:rgba(200,160,40,.1);border:1px solid rgba(200,160,40,.3);text-align:center">'+
      '<p style="font-size:13px;color:rgba(240,208,96,.9)">PDF\'i kaydettikten sonra lütfen analiz ekibine iletiniz</p>'+ 
      '<p style="font-size:14px;color:var(--glt);font-weight:600;margin-top:4px">burak.hulagu@atauni.edu.tr</p>'+ 
      '<p style="font-size:14px;color:var(--glt);font-weight:600">ahmet.ozakin@atauni.edu.tr</p>'+ 
      '</div>'+ 
      '</div>';
    return html;
  }
  return '';
}

function sendMail(){
  var lines=['=== SEA MODEL TASARIM FORMU ===','',
    '[ KİŞİSEL BİLGİLER ]',
    'Ad Soyad: '+st.person.name+' '+st.person.surname,
    'Telefon: '+st.person.phone,
    'E-posta: '+st.person.email,
    'Bölüm: '+st.person.dept,'',
    '[ GENEL PARAMETRELER ]',
    'Çene: '+({upper:'Üst',lower:'Alt',both:'Her iki çene'}[st.region]||'—'),
    'Diş sayısı: '+st.count,
    'İmplant modeli: '+(st.implantModel||'Belirtilmedi'),
    '3D implant datası: '+({yes:'Evet',no:'Hayır',partial:'Kısmen'}[st.implant3d]||'—'),
    'İmplant geometrisi: '+({yes:'Analiz ekibi modelleyecek',provide:'Kullanıcı temin edecek',other:'Diğer'}[st.implantModeling]||'—'),
    'Kemik modeli: '+({patient:'Hasta-özgü',open:'Açık erişimli',team:'Ekip modeli'}[st.boneModel]||'—'),
    'Yükleme tipi: '+({static:'Statik',dynamic:'Dinamik/siklik',both:'Statik + dinamik/siklik'}[st.loadType]||'—'),
    'Dinamik yük notu: '+(st.dynLoadNote||'—'),
    'Analiz çıktıları: '+(st.outputs.join(', ')||'—'),
    'İncelenecek bölgeler: '+(st.regions.join(', ')||'—'),''];
  st.params.forEach(function(p){
    lines.push('[ MODEL PARAMETRESİ '+p.id+' ]');
    lines.push('Dişler: '+p.teeth.slice().sort(function(a,b){return a-b;}).join(', '));
    Object.entries(p.roles).forEach(function(e){lines.push('Diş '+e[0]+': '+({implant:'İmplant',pontic:'Pontik',kant:'Kantilever'}[e[1]]||e[1]));});
    lines.push('Greft: '+(p.greft==='yes'?'Evet':(p.greft==='no'?'Hayır':'—')));
    if(p.greft==='yes')lines.push('Greft açıklaması: '+(p.greftNote||'—'));
    Object.entries(p.kantLenMap).forEach(function(e){lines.push('Diş '+e[0]+' kantilever uzantı uzunluğu: '+e[1]+' mm');});
    Object.entries(p.implants).forEach(function(e){lines.push('Diş '+e[0]+' implant: Ø'+(e[1].diam||'?')+' mm / Boy '+(e[1].len||'?')+' mm');});
    Object.entries(p.loading).forEach(function(e){lines.push('Diş '+e[0]+' yük: '+(e[1].force||'?')+' N | '+(e[1].dir||'?')+' | '+(e[1].area||'?'));});
    lines.push('');
  });
  if(st.extra)lines.push('EK NOTLAR: '+st.extra);
  var subject=encodeURIComponent('SEA Model Formu — '+st.person.name+' '+st.person.surname);
  var body=encodeURIComponent(lines.join('\n'));
  window.location.href='mailto:burak.hulagu@atauni.edu.tr?subject='+subject+'&body='+body;
}

var maxVisited=0;
function addExtraRegion(){if(st.extraRegion.trim()){st.regions.push(st.extraRegion.trim());st.extraRegion="";R();}}
function togArr(arr,v){var i=arr.indexOf(v);if(i>=0)arr.splice(i,1);else arr.push(v);}
function R(){
  if(cur>maxVisited)maxVisited=cur;
  document.getElementById('prog').innerHTML=STEPS.map(function(s,i){
    var cls=i<cur?'done':i===cur?'active':'';
    var lc=i<cur?'done':'';
    var shortNames=['Kişisel','Çene','Diş Sayısı','Diş & Rol','Kant.','İmplant','Model','Yükleme','Çıktılar','Notlar','Özet'];
    return '<div class="si"><div class="sp '+cls+'" onclick="goTo('+i+')">'+
      (i<cur?'✓':(i+1))+
      '</div><div class="sn">'+(shortNames[i]||s.title)+'</div></div>'+
      (i<STEPS.length-1?'<div class="sp-line '+lc+'"></div>':'');
  }).join('');

  var s=STEPS[cur];
  document.getElementById('fbody').innerHTML=
    '<div class="card">'+
    '<div class="chdr">'+
    '<div class="cicon" style="background:'+s.bg+'">'+s.icon+'</div>'+
    '<div><div class="ctitle">'+s.title+'</div>'+
    '<div class="csub">Adım '+(cur+1)+' / '+STEPS.length+'</div></div>'+
    '<button class="clear-step" onclick="resetStep()">Seçimleri / verileri kaldır</button>'+
    '</div>'+stepBody()+'</div>';

  var isFirst=cur===0, isLast=cur===STEPS.length-1;
  document.getElementById('fnav').innerHTML=
    (!isFirst?'<button class="bback" onclick="cur--;R()">← Geri</button>':'<div></div>')+
    (!isLast
      ?'<button class="bnext" onclick="cur++;R()">İleri →</button>'
      :'<div></div>');
}
function goTo(i){if(i<=maxVisited){cur=i;R();}}
function goEdit(i){cur=i;if(i>maxVisited)maxVisited=i;R();}
R();
</script>
</body>
</html>
